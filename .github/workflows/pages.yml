name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: house-cup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: house-cup/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages on first run and expose base_path/origin as outputs.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          BUILD_TARGET: pages
          # Serve under the project sub-path (https://<user>.github.io/<repo>/).
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Supabase backend — anon key is public by design (RLS enforces access).
          # Stored as repo variables, inlined into the client bundle at build.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Disable Jekyll processing of _next assets
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: house-cup/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
