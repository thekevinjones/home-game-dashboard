<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <!-- Seamless deep-purple parchment mottle used as the panel/card surface. -->
  <defs>
    <filter id="mottleDark" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" seed="8" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.055  0 0 0 0 0.043  0 0 0 0 0.13  0.5 0.25 0 -0.14 0"/>
    </filter>
    <filter id="mottleLight" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="21" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.39  0 0 0 0 0.33  0 0 0 0 0.62  0.4 0.2 0 -0.2 0"/>
    </filter>
  </defs>
  <rect width="320" height="320" fill="#262047"/>
  <rect width="320" height="320" filter="url(#mottleDark)"/>
  <rect width="320" height="320" filter="url(#mottleLight)" opacity="0.45"/>
</svg>
