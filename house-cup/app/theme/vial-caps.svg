<svg xmlns="http://www.w3.org/2000/svg" width="120" height="32" viewBox="0 0 120 32">
  <!-- Potion-vial overlay: brass end caps + glass shine, used as a 9-slice
       border-image laid over the win-bar track (slice 15 top/bottom, 18 sides). -->
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eccb7f"/>
      <stop offset="0.45" stop-color="#c69c4a"/>
      <stop offset="1" stop-color="#7d5a1e"/>
    </linearGradient>
  </defs>
  <!-- glass hairlines along the tube -->
  <rect x="14" y="1" width="92" height="1.4" fill="rgba(255,255,255,0.24)"/>
  <rect x="14" y="29.6" width="92" height="1.4" fill="rgba(255,255,255,0.14)"/>
  <!-- top shine + faint lower reflection -->
  <rect x="16" y="4.6" width="88" height="7.4" rx="3.7" fill="rgba(255,255,255,0.26)"/>
  <rect x="16" y="24" width="88" height="3" rx="1.5" fill="rgba(255,255,255,0.10)"/>
  <!-- brass caps -->
  <g>
    <rect x="0.8" y="0.8" width="15" height="30.4" rx="7" fill="url(#brass)" stroke="#4e3a17" stroke-width="1.2"/>
    <rect x="6.2" y="1.6" width="1.8" height="28.8" fill="rgba(0,0,0,0.22)"/>
    <rect x="2.6" y="3.4" width="2.4" height="10" rx="1.2" fill="rgba(255,244,214,0.5)"/>
  </g>
  <g>
    <rect x="104.2" y="0.8" width="15" height="30.4" rx="7" fill="url(#brass)" stroke="#4e3a17" stroke-width="1.2"/>
    <rect x="112" y="1.6" width="1.8" height="28.8" fill="rgba(0,0,0,0.22)"/>
    <rect x="106" y="3.4" width="2.4" height="10" rx="1.2" fill="rgba(255,244,214,0.5)"/>
  </g>
</svg>
