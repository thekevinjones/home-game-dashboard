<svg xmlns="http://www.w3.org/2000/svg" width="40" height="58" viewBox="0 0 40 58">
  <!-- Little potion flask hero decoration. -->
  <defs>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fce7c"/>
      <stop offset="1" stop-color="#2c7a44"/>
    </linearGradient>
  </defs>
  <!-- cork -->
  <rect x="14.5" y="1" width="11" height="9" rx="2.4" fill="#8a5a2e" stroke="#5c3a17" stroke-width="1.2"/>
  <rect x="16.2" y="2.6" width="2.4" height="5.6" rx="1" fill="rgba(255,230,190,0.35)"/>
  <!-- liquid (bottom of bulb) -->
  <path d="M6.2 42 A14 14 0 0 0 33.8 42 C33.8 42 28 38.5 20 38.5 C12 38.5 6.2 42 6.2 42 Z" fill="url(#liquid)"/>
  <ellipse cx="20" cy="40" rx="11.5" ry="2.6" fill="#79dd92" opacity="0.85"/>
  <!-- glass -->
  <path d="M15.5 9.5 V22 C9 25 5 31.5 5 38.5 C5 47 11.5 54 20 54 C28.5 54 35 47 35 38.5 C35 31.5 31 25 24.5 22 V9.5"
        fill="rgba(190,225,255,0.10)" stroke="rgba(225,238,255,0.6)" stroke-width="1.7" stroke-linejoin="round"/>
  <rect x="12" y="8.5" width="16" height="3.4" rx="1.7" fill="none" stroke="rgba(225,238,255,0.6)" stroke-width="1.5"/>
  <!-- shine -->
  <path d="M11 32 C9.6 35 9.4 39 10.6 42.5" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round"/>
  <!-- bubbles -->
  <circle cx="24" cy="45" r="1.6" fill="rgba(230,255,236,0.55)"/>
  <circle cx="17" cy="48" r="1.1" fill="rgba(230,255,236,0.45)"/>
</svg>
