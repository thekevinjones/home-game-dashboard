  </defs>
  <!-- feather body -->
  <path d="M39 4 C29 4 20 9 14.5 17.5 C11 23 9.5 28.5 9 32.5 C13 32 18.5 30.5 24 27 C32.5 21.5 39 13 39 4 Z"
